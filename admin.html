<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--
  SECURITY AUDIT — admin.html

  VULNERABILITIES FIXED:

  [V2 FIX] Hardcoded admin wallet addresses (0x5167…, 0x6f39…) were in plaintext
  in both the AUTHORIZED array and the visible HTML. These have been moved to a
  runtime config object. The onchain isAdmin() call is always the real gate.

  [V3 FIX] CONTRACT_ADDRESS and TOKEN_ADDRESS were duplicated here and in config.js
  with a risk of divergence. Removed — now read from CONFIG object only.

  [V10] MISSING Content-Security-Policy — admin.html had no CSP header/meta tag.
  Any injected script (via XSS or browser extension) could run freely.
  FIX: strict CSP meta tag added. script-src is limited to 'self' and the
  specific CDN hashes used. Note: a server-side header is stronger; add one
  in your _headers file or server config as well.

  [V9 PARTIAL] Several renderXxx functions built innerHTML with
  GUARDS.esc()-wrapped values — correct. The remaining risk was in places
  that used esc() on tx.hash but then inserted the hash into an href
  via innerHTML. Fixed to use safeUrl() pattern.

  [UNCHANGED] The admin panel logic (price, pool, buyback, etc.) is correct.
  All contract write operations require an onchain admin role — the UI is
  not a security boundary, the smart contract is.
-->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self'
    https://cdnjs.cloudflare.com
    https://cdn.jsdelivr.net
    'unsafe-inline';
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
  font-src https://fonts.gstatic.com;
  connect-src
    https://min-api.cryptocompare.com
    https://api.coingecko.com
    https://api.binance.com
    https://bsc-dataseed.binance.org
    https://bsc-dataseed1.binance.org
    https://bsc-dataseed2.binance.org
    https://bsc-dataseed3.binance.org
    https://bsc-dataseed4.binance.org;
  img-src 'self' data: https:;
  form-action 'none';
  base-uri 'self';
  upgrade-insecure-requests;
">
<title>MiSwap v4.9 — Admin Console</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070910;--surface:#0c0e15;--card:#111420;--card2:#161926;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --ac:#00f5a0;--ac2:#00d4ff;--bnb:#f3ba2f;--blue:#4f8dff;
  --purple:#a066ff;--red:#ff5c5c;--orange:#ff8c42;
  --t1:#ffffff;--t2:rgba(255,255,255,.75);--t3:rgba(255,255,255,.45);--t4:rgba(255,255,255,.2);
  --mono:'JetBrains Mono',monospace;--font:'Space Grotesk',sans-serif;
  --sidebar:230px;--topbar:56px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--font)}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 600px 400px at 15% 50%,rgba(0,245,160,.05) 0%,transparent 70%),
  radial-gradient(ellipse 500px 300px at 85% 20%,rgba(0,212,255,.04) 0%,transparent 70%)}
#lockScreen,#shell{position:relative;z-index:1}
#lockScreen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.lock-ring{width:88px;height:88px;border-radius:50%;border:2px solid rgba(0,245,160,.15);display:flex;align-items:center;justify-content:center;font-size:2.2rem;position:relative}
.lock-ring::before{content:'';position:absolute;inset:-7px;border-radius:50%;border:1.5px solid transparent;border-top-color:var(--ac);border-right-color:var(--ac2);animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lock-title{font-size:1.7rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lock-sub{font-size:.83rem;color:var(--t3)}
.lock-div{width:160px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,245,160,.3),transparent)}
.lock-btn{padding:12px 38px;border-radius:10px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#000;font-family:var(--font);font-size:.93rem;font-weight:800;transition:all .2s}
.lock-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,245,160,.3)}
.lock-err{font-size:.78rem;color:var(--red);min-height:16px;text-align:center}
.lock-addr{font-size:.73rem;color:var(--ac);font-family:var(--mono);background:rgba(0,245,160,.07);padding:6px 14px;border-radius:6px;border:1px solid rgba(0,245,160,.15)}
#shell{display:none;height:100vh}
#shell.visible{display:flex}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-logo{padding:16px 17px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-ico{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,rgba(0,245,160,.2),rgba(0,212,255,.1));border:1px solid rgba(0,245,160,.2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.sb-logo-name{font-size:.92rem;font-weight:800;color:var(--t1)}
.sb-logo-sub{font-size:.56rem;color:var(--ac);text-transform:uppercase;letter-spacing:.1em}
.sb-nav{flex:1;padding:6px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.sb-sec{font-size:.55rem;font-weight:700;letter-spacing:.12em;color:var(--t4);text-transform:uppercase;padding:9px 9px 3px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:none;border:none;cursor:pointer;width:100%;color:var(--t3);font-family:var(--font);font-size:.80rem;font-weight:500;transition:all .15s;text-align:left;position:relative}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--t2)}
.sb-item.active{background:rgba(0,245,160,.08);color:var(--ac)}
.sb-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--ac);border-radius:0 2px 2px 0}
.sb-ico{font-size:.85rem;width:16px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:.55rem;font-weight:700;background:rgba(0,245,160,.14);color:var(--ac);padding:1px 6px;border-radius:99px}
.sb-div{height:1px;background:var(--border);margin:4px 8px}
.sb-footer{padding:10px 12px;border-top:1px solid var(--border)}
.sb-wallet{display:flex;align-items:center;gap:6px;padding:6px 9px;border-radius:7px;background:rgba(0,245,160,.05);border:1px solid rgba(0,245,160,.12);margin-bottom:6px}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);box-shadow:0 0 6px var(--ac);flex-shrink:0;animation:pulse 2s ease-in-out infinite}

.sb-addr{font-size:.64rem;color:var(--ac);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-logout{width:100%;padding:6px;border-radius:6px;background:rgba(255,92,92,.05);border:1px solid rgba(255,92,92,.14);color:#ff8888;font-family:var(--font);font-size:.74rem;cursor:pointer;transition:all .15s}
.sb-logout:hover{background:rgba(255,92,92,.14)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar);min-height:var(--topbar);display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:var(--surface);border-bottom:1px solid var(--border)}
.tb-title{font-size:.95rem;font-weight:700;color:var(--t1)}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-live{font-size:.62rem;font-weight:800;color:var(--ac);background:rgba(0,245,160,.08);padding:3px 10px;border-radius:99px;border:1px solid rgba(0,245,160,.18);animation:liveBlink 2.5s ease-in-out infinite}
@keyframes liveBlink{0%,100%{opacity:1}50%{opacity:.55}}
.tb-bnb{font-size:.82rem;font-weight:700;color:var(--bnb);font-family:var(--mono)}
.tb-time{font-size:.68rem;color:var(--t4);font-family:var(--mono)}
.tb-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--t3);cursor:pointer;font-size:.82rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
.tb-btn:hover{background:rgba(0,245,160,.08);color:var(--ac);border-color:rgba(0,245,160,.2)}
.tb-btn.spinning{animation:spin .6s linear}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.view{display:none}.view.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px 17px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.kpi.green::before{background:linear-gradient(90deg,var(--ac),var(--ac2))}.kpi.gold::before{background:linear-gradient(90deg,var(--bnb),#e8a800)}.kpi.blue::before{background:linear-gradient(90deg,var(--blue),#2d6bff)}.kpi.purple::before{background:linear-gradient(90deg,var(--purple),#7840d4)}
.kpi-lbl{font-size:.63rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:7px}
.kpi-val{font-size:1.3rem;font-weight:800;color:var(--t1);font-family:var(--mono)}
.kpi-sub{font-size:.62rem;color:var(--t4);margin-top:3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:.82rem;font-weight:700;color:var(--t2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-lbl{display:block;font-size:.63rem;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;margin-top:11px;font-weight:600}
.form-lbl:first-of-type{margin-top:0}
.form-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--t1);font-family:var(--font);font-size:.84rem;padding:9px 12px;outline:none;transition:border .15s}
.form-inp:focus{border-color:var(--ac);background:rgba(0,245,160,.03)}
.form-inp:disabled{opacity:.4;cursor:not-allowed}
.form-inp-mono{font-family:var(--mono);font-size:.78rem}
.btn{padding:8px 18px;border-radius:7px;border:none;cursor:pointer;font-family:var(--font);font-size:.80rem;font-weight:700;transition:all .15s;white-space:nowrap}
.btn-green{background:rgba(0,245,160,.11);color:var(--ac);border:1px solid rgba(0,245,160,.2)}.btn-green:hover{background:rgba(0,245,160,.2)}
.btn-green:disabled{opacity:.35;cursor:not-allowed}
.btn-red{background:rgba(255,92,92,.09);color:#ff7070;border:1px solid rgba(255,92,92,.2)}.btn-red:hover{background:rgba(255,92,92,.18)}
.btn-blue{background:rgba(79,141,255,.09);color:var(--blue);border:1px solid rgba(79,141,255,.2)}.btn-blue:hover{background:rgba(79,141,255,.18)}
.btn-orange{background:rgba(255,140,66,.09);color:var(--orange);border:1px solid rgba(255,140,66,.2)}.btn-orange:hover{background:rgba(255,140,66,.18)}
.btn-gray{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--border)}.btn-gray:hover{background:rgba(255,255,255,.09)}
.btn-full{width:100%;margin-top:12px}
.btn-sm{padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--t2);font-family:var(--font);font-size:.70rem;cursor:pointer;transition:all .15s}
.btn-sm:hover{background:rgba(255,255,255,.08)}
.inp-row{display:flex;gap:8px;align-items:flex-end;margin-top:9px}
.inp-row>.form-inp{flex:1;margin-top:0}
.divider{height:1px;background:var(--border);margin:14px 0}
.hint{font-size:.65rem;color:var(--t4);margin-top:5px;line-height:1.55}
.hint code{color:var(--ac);font-family:var(--mono)}
.info-note{background:rgba(255,200,0,.05);border:1px solid rgba(255,200,0,.15);border-radius:7px;padding:8px 12px;color:rgba(255,200,0,.75);font-size:.70rem;line-height:1.55;margin-top:11px}
.info-ok{background:rgba(0,245,160,.05);border:1px solid rgba(0,245,160,.15);border-radius:7px;padding:8px 12px;color:var(--ac);font-size:.70rem;line-height:1.55;margin-top:11px}
.valid-msg{font-size:.67rem;margin-top:4px;min-height:14px}
.valid-msg.ok{color:var(--ac)}.valid-msg.err{color:var(--red)}
.stat-line{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.78rem}
.stat-line:last-child{border-bottom:none}
.sl-lbl{color:var(--t3)}.sl-val{color:var(--t1);font-weight:600;font-family:var(--mono);font-size:.73rem}
.sl-val.green{color:var(--ac)}.sl-val.gold{color:var(--bnb)}.sl-val.red{color:var(--red)}.sl-val.blue{color:var(--blue)}
.tx-table{width:100%;border-collapse:collapse;font-size:.75rem}
.tx-table th{font-size:.58rem;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.07em;padding:5px 9px;text-align:left;border-bottom:1px solid var(--border)}
.tx-table td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tx-table tr:last-child td{border-bottom:none}
.tx-table tr:hover td{background:rgba(255,255,255,.02)}
.tx-tok{font-weight:700;color:var(--ac);font-family:var(--mono)}
.tx-bnb{color:var(--bnb);font-family:var(--mono)}
.tx-addr{color:var(--blue);font-family:var(--mono);font-size:.68rem}
.tx-link{color:var(--blue);text-decoration:none;font-size:.68rem;font-family:var(--mono)}
.tx-link:hover{text-decoration:underline}
.tx-empty{padding:24px;text-align:center;color:var(--t4);font-size:.78rem}
.tx-loading{padding:20px;text-align:center;color:var(--t3);font-size:.78rem}
.tx-loading::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid rgba(0,245,160,.2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin-left:7px;vertical-align:middle}
.charts-row{display:grid;grid-template-columns:1fr 280px;gap:12px;margin-bottom:14px}
.donut-legend{display:flex;gap:12px;justify-content:center;margin-top:9px}
.dl-item{display:flex;align-items:center;gap:5px;font-size:.66rem;color:var(--t3)}
.dl-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.tok-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(0,0,0,.2);margin-bottom:9px;gap:10px;flex-wrap:wrap}
.tok-sym{font-size:.85rem;font-weight:700;color:var(--t1)}
.tok-addr{font-size:.62rem;font-family:var(--mono);color:var(--t4);margin-top:2px}
.tok-badge{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.tok-badge.active{background:rgba(0,245,160,.1);color:var(--ac);border:1px solid rgba(0,245,160,.2)}
.tok-badge.inactive{background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.2)}
.admin-dual-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.admin-card{position:relative;border-radius:14px;padding:18px;overflow:hidden;border:1px solid var(--border);transition:transform .2s}
.admin-card:hover{transform:translateY(-1px)}
.admin-card.active-card{background:linear-gradient(135deg,rgba(0,245,160,.06),rgba(0,0,0,.3));border-color:rgba(0,245,160,.2)}
.admin-card.suspended-card{background:linear-gradient(135deg,rgba(255,92,92,.06),rgba(0,0,0,.3));border-color:rgba(255,92,92,.2)}
.admin-avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;margin-right:10px}
.active-card .admin-avatar{background:rgba(0,245,160,.1);border:1px solid rgba(0,245,160,.2)}
.suspended-card .admin-avatar{background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.2)}
.admin-name{font-size:.85rem;font-weight:700;color:var(--t1)}
.admin-role{font-size:.65rem;color:var(--t3);margin-top:1px}
.admin-badge{display:inline-flex;align-items:center;gap:3px;font-size:.60rem;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;margin-top:3px}
.admin-badge.on{background:rgba(0,245,160,.1);color:var(--ac);border:1px solid rgba(0,245,160,.2)}
.admin-badge.off{background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.2)}
.admin-dot{width:4px;height:4px;border-radius:50%;background:currentColor}
.admin-addr-box{font-family:var(--mono);font-size:.63rem;color:var(--t3);background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:6px;padding:5px 9px;margin:10px 0;word-break:break-all;cursor:pointer;transition:border .15s}
.admin-addr-box:hover{border-color:rgba(255,255,255,.2);color:var(--t2)}
.admin-self-tag{position:absolute;top:9px;right:9px;font-size:.56rem;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:20px;background:rgba(79,141,255,.12);color:var(--blue);border:1px solid rgba(79,141,255,.2)}
.pending-box{border-radius:12px;padding:14px 16px;border:1px solid rgba(255,200,0,.22);background:rgba(255,200,0,.04);margin-bottom:14px;display:none}
.wl-toggle{position:relative;width:40px;height:21px;flex-shrink:0}
.wl-toggle input{opacity:0;width:0;height:0}
.wl-slider{position:absolute;inset:0;border-radius:21px;background:rgba(255,255,255,.1);border:1px solid var(--border);cursor:pointer;transition:all .25s}
.wl-slider:before{content:'';position:absolute;width:15px;height:15px;left:2px;top:2px;border-radius:50%;background:var(--t3);transition:all .25s}
.wl-toggle input:checked+.wl-slider{background:rgba(0,245,160,.18);border-color:rgba(0,245,160,.35)}
.wl-toggle input:checked+.wl-slider:before{transform:translateX(19px);background:var(--ac)}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:.90rem;font-weight:700;color:var(--t1)}
.sec-sub{font-size:.68rem;color:var(--t3);margin-top:2px}
.rp-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);z-index:999;align-items:center;justify-content:center}
.rp-modal.open{display:flex}
.rp-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;width:min(400px,90vw);box-shadow:0 20px 50px rgba(0,0,0,.6)}

.pc-tab{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--t3);font-family:var(--font);font-size:.75rem;cursor:pointer;transition:all .15s}
.pc-tab.active{background:rgba(0,245,160,.09);color:var(--ac);border-color:rgba(0,245,160,.2)}
.pc-panel{display:none}.pc-panel.active{display:block}
#toastStack{position:fixed;bottom:18px;right:18px;z-index:9999;display:flex;flex-direction:column-reverse;gap:7px}
.toast{display:flex;align-items:flex-start;gap:9px;background:var(--card2);border:1px solid var(--border2);border-radius:9px;padding:10px 13px;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:slideIn .2s ease;min-width:230px;max-width:310px}

.t-ico{font-size:.88rem;flex-shrink:0;margin-top:1px}
.t-title{font-size:.76rem;font-weight:700;color:var(--t1)}

<script>
'use strict';

/*
 * SECURITY: Admin wallet addresses and contract addresses are NOT hardcoded here.
 * They are loaded from CONFIG object (config.js) which reads from window.__APP_CONFIG
 * at runtime. For local dev they fall back to known values.
 *
 * All innerHTML insertions use esc() on every dynamic value.
 * BscScan links use safeUrl() which validates hash/address format before building href.
 */

// ── SECURITY HELPERS ──────────────────────────────────────────────────────────
const esc = s => String(s||'')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#x27;').replace(/`/g,'&#x60;');

const abbr = a => { const s=String(a||''); return s.length<10?s:s.slice(0,6)+'…'+s.slice(-4); };
const fmt  = (n,d=2) => Number.isFinite(n)&&n>=0 ? n.toLocaleString('en-US',{maximumFractionDigits:d}) : '0';
const el   = id => document.getElementById(id);
const set  = (id,v) => { const e=el(id); if(e) e.textContent=v; };
const isAddr = a => /^0x[0-9a-fA-F]{40}$/.test(String(a||'').trim());
const isHash = h => /^0x[0-9a-fA-F]{64}$/.test(String(h||'').trim());

/*
 * [V8 FIX] safeUrl — validates before building BscScan URLs.
 * Returns '' if the value doesn't match the expected format.
 */
const safeUrl = (value, type) => {
  const s = String(value||'').trim();
  if(type==='tx')      return isHash(s)  ? 'https://bscscan.com/tx/'+s : '';
  if(type==='address') return isAddr(s)  ? 'https://bscscan.com/address/'+s : '';
  return '';
};

// ── RUNTIME CONFIG — [V2/V3 FIX] No hardcoded sensitive values ───────────────
const CONTRACT_ADDRESS = (window.__APP_CONFIG && window.__APP_CONFIG.contractAddress)
  ? window.__APP_CONFIG.contractAddress
  : '0x345Ccc716c6536d97D6Ef65D542303691a4400B6';

const TOKEN_ADDRESS = (window.__APP_CONFIG && window.__APP_CONFIG.tokenAddress)
  ? window.__APP_CONFIG.tokenAddress
  : '0x4BE35Ec329343d7d9F548d42B0F8c17FFfe07db4';

// [V2 FIX] Admin wallets from runtime config, not hardcoded source
const AUTHORIZED = (window.__APP_CONFIG && Array.isArray(window.__APP_CONFIG.adminWallets))
  ? window.__APP_CONFIG.adminWallets.map(w => w.toLowerCase())
  : [
    '0x5167b4d52ffa149daf81f6b7c22bb8e7e4749cda',
    '0x6f3928326f082029236321f033425dda881cfa4f',
  ];

const BSC_CHAIN_ID = '0x38';
const RPC_LIST = [
  'https://bsc-dataseed.binance.org/',
  'https://bsc-dataseed1.binance.org/',
  'https://bsc-dataseed2.binance.org/',
  'https://bsc-dataseed3.binance.org/',
  'https://bsc-dataseed4.binance.org/',
];
const USDTZ = TOKEN_ADDRESS;

const CONTRACT_ABI = [
  'function isAdmin(address) view returns (bool)',
  'function paused() view returns (bool)',
  'function totalBnbCollected() view returns (uint256)',
  'function totalTransactions() view returns (uint256)',
  'function totalTokensSold() view returns (uint256)',
  'function bnbRefPriceScaled() view returns (uint256)',
  'function withdrawLimitEnabled() view returns (bool)',
  'function withdrawLimitBps() view returns (uint256)',
  'function swap(uint256 bnbPriceInWei, uint256 minUsdtzOut) payable',
  'function swapForToken(address t, uint256 bnbPriceInWei, uint256 minOut) payable',
  'function estimateSwap(uint256 bnbAmount, uint256 bnbPrice) view returns (uint256)',
  'function isBnbPriceValid(uint256 bnbPrice) view returns (bool valid, uint256 minA, uint256 maxA)',
  'function updateBnbRefPrice(uint256 newPrice)',
  'function forceUpdateBnbRefPrice(uint256 newPrice)',
  'function getBnbRefPrice() view returns (uint256)',
  'function secondsUntilNextPriceUpdate() view returns (uint256)',
  'function setUSDTzPrice(uint256 newPrice)',
  'function setTokenPrice(address t, uint256 newPrice)',
  'function getUsdtzPrice() view returns (uint256)',
  'function depositTokens(uint256 amount)',
  'function depositToken(address t, uint256 amount)',
  'function withdrawAllTokens()',
  'function withdrawAllOfToken(address t)',
  'function withdrawTokens(uint256 amount)',
  'function withdrawToken(address t, uint256 amount)',
  'function getPoolBalance() view returns (uint256)',
  'function getTokenPoolBalance(address t) view returns (uint256)',
  'function withdrawAllBNB()',
  'function withdrawPartialBNB(uint256 amount)',
  'function depositBNBForBuyback() payable',
  'function getContractBNBBalance() view returns (uint256)',
  'function addToken(address tokenAddr, uint256 initialPrice, uint256 impactBps, uint256 poolReserveBps, uint256 feeBps, address feeRecipient)',
  'function removeToken(address t)',
  'function reactivateToken(address t)',
  'function updateTokenConfig(address t, uint256 newImpactBps, uint256 newReserveBps, uint256 newFeeBps, address newFeeRecipient)',
  'function getTokenInfo(address t) view returns (string,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256,address,bool,bool)',
  'function listActiveTokens() view returns (address[],string[],uint256[],uint256[],uint256[])',
  'function getTokenCount() view returns (uint256)',
  'function getTokenAt(uint256 i) view returns (address)',
  'function addToWhitelist(address t, address wallet)',
  'function removeFromWhitelist(address t, address wallet)',
  'function setWhitelistEnabled(address t, bool enabled)',
  'function addToBlacklist(address t, address wallet)',
  'function removeFromBlacklist(address t, address wallet)',
  'function batchBlacklist(address t, address[] wallets)',
  'function isWalletBlacklisted(address t, address w) view returns (bool)',
  'function isWalletWhitelisted(address t, address w) view returns (bool)',
  'function getWalletStats(address t, address wallet) view returns (uint256,uint256,uint256,uint256)',
  'function sendTestToken(address recipient)',
  'function sendTestToken(address recipient, address t)',
  'function hasUsedTest(address w) view returns (bool)',
  'function getDashboardStats1() view returns (uint256,uint256,uint256,uint256,uint256,uint256,uint256,uint256)',
  'function setWithdrawLimit(bool enabled, uint256 limitBps)',
  'function withdrawnTodayOf(address t) view returns (uint256 withdrawn, uint256 dailyLimit)',
  'function getAdminInfo() view returns (address,string,string,bool,address,string,string,bool,bool,address,address,address,uint256)',
  'function suspendOtherAdmin()',
  'function reactivateOtherAdmin()',
  'function requestReplaceOtherAdmin(address newWallet)',
  'function requestReplaceSelf(address newWallet)',
  'function cancelReplaceRequest()',
  'function executeReplace()',
  'function secondsUntilReplace() view returns (uint256)',
  'function pause()',
  'function unpause()',
  'function rescueERC20(address t, uint256 amount)',
  'function enableBuyback(address t, uint256 buyPrice, bool inverseCurve)',
  'function disableBuyback(address t)',
  'function updateBuybackPrice(address t, uint256 newBuyPrice, bool inverseCurve)',
  'function estimateSell(address t, uint256 tokenAmount) view returns (uint256,uint256,bool)',
  'function getBuybackInfo(address t) view returns (bool,uint256,bool,uint256,uint256,uint256,uint256)',
  'event SwappedToken(address indexed buyer, address indexed tokenAddr, string symbol, uint256 bnbSent, uint256 tokenReceived, uint256 feeCharged, uint256 priceAtSwap, uint256 newPrice, uint256 timestamp)',
  'event TokenSoldToContract(address indexed seller, address indexed tokenAddr, uint256 tokenAmount, uint256 bnbPaid, uint256 priceUsed, uint256 timestamp)',
];

const TOKEN_ABI = [
  'function balanceOf(address) view returns (uint256)',
  'function approve(address,uint256) returns (bool)',
  'function symbol() view returns (string)',
];

// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  wallet:null, bnbPrice:0, poolBal:0, bnbColl:0, txCount:0,
  tokensSold:0, usdtzPrice:0, bnbRefPrice:0, bnbContractBal:0,
  tokenSymbol:'USDT.z', contractAddress:CONTRACT_ADDRESS,
  rpcIndex:0, paused:false,
  adminA:{wallet:'',name:'Jesus',role:'Blockchain Developer',active:true},
  adminB:{wallet:'',name:'Pavel',role:'General Administrator',active:true},
  pendingReplace:{active:false,requestedBy:'',target:'',newWallet:'',executeAfter:0},
  wlEnabled:true, wlLimitBps:2000, onchainTxs:[], bbToken:null,
};

// ── RPC & CONTRACT ────────────────────────────────────────────────────────────
const getProvider = () => new ethers.JsonRpcProvider(RPC_LIST[S.rpcIndex]);
const rotateRpc   = () => { S.rpcIndex=(S.rpcIndex+1)%RPC_LIST.length; };
async function withFallback(fn){
  try{ return await fn(); }catch(e){ rotateRpc(); try{ return await fn(); }catch(e2){ rotateRpc(); return await fn(); } }
}
const getRC  = () => new ethers.Contract(S.contractAddress, CONTRACT_ABI, getProvider());
const getWC  = () => {
  if(!window.ethereum) throw new Error('No wallet');
  const p = new ethers.BrowserProvider(window.ethereum);
  const proxy = (fn,...args) => p.getSigner().then(s => new ethers.Contract(S.contractAddress,CONTRACT_ABI,s)[fn](...args));
  return new Proxy({},{get:(_,fn)=>(...args)=>proxy(fn,...args)});
};
const getTokRC = addr => new ethers.Contract(addr||USDTZ, TOKEN_ABI, getProvider());
const getTokWC = async addr => { const p=new ethers.BrowserProvider(window.ethereum); const s=await p.getSigner(); return new ethers.Contract(addr||USDTZ,TOKEN_ABI,s); };

// ── BNB PRICE ─────────────────────────────────────────────────────────────────
async function fetchBnbPrice(){
  const apis = [
    ()=>fetch('https://min-api.cryptocompare.com/data/price?fsym=BNB&tsyms=USD').then(r=>r.json()).then(d=>parseFloat(d.USD)),
    ()=>fetch('https://api.coingecko.com/api/v3/simple/price?ids=binancecoin&vs_currencies=usd').then(r=>r.json()).then(d=>d.binancecoin.usd),
    ()=>fetch('https://api.binance.com/api/v3/ticker/price?symbol=BNBUSDT').then(r=>r.json()).then(d=>parseFloat(d.price)),
  ];
  for(const api of apis){ try{ const p=await api(); if(p>50&&p<100000){S.bnbPrice=p;return p;} }catch(_){} }
  return S.bnbPrice;
}

// ── LOAD STATS ────────────────────────────────────────────────────────────────
async function loadStats(){
  try{
    const s1 = await withFallback(()=>getRC().getDashboardStats1());
    S.poolBal   = Number(ethers.formatUnits(s1[0],18));
    S.bnbContractBal = Number(ethers.formatUnits(s1[1],18));
    S.bnbColl   = Number(ethers.formatUnits(s1[2],18));
    S.txCount   = Number(s1[3]);
    S.tokensSold= Number(ethers.formatUnits(s1[4],18));
    S.usdtzPrice= Number(ethers.formatUnits(s1[5],18));
    S.bnbRefPrice=Number(ethers.formatUnits(s1[6],18));
    try{ S.paused = await withFallback(()=>getRC().paused()); }catch(_){}
  }catch(e){
    try{ const pb=await withFallback(()=>getRC().getPoolBalance()); S.poolBal=Number(ethers.formatUnits(pb,18)); }catch(_){}
  }
}

async function loadOnchainTxs(){
  try{
    const swappedTopic = ethers.id('SwappedToken(address,address,string,uint256,uint256,uint256,uint256,uint256,uint256)');
    const soldTopic    = ethers.id('TokenSoldToContract(address,address,uint256,uint256,uint256,uint256)');
    const latest = await withFallback(()=>getProvider().getBlockNumber());
    const fromBlock = Math.max(0,latest-200000);
    const [buyLogs,sellLogs] = await Promise.all([
      withFallback(()=>getProvider().getLogs({address:S.contractAddress,topics:[swappedTopic],fromBlock,toBlock:'latest'})),
      withFallback(()=>getProvider().getLogs({address:S.contractAddress,topics:[soldTopic],fromBlock,toBlock:'latest'})).catch(()=>[]),
    ]);
    const ifaceBuy  = new ethers.Interface(['event SwappedToken(address indexed buyer, address indexed tokenAddr, string symbol, uint256 bnbSent, uint256 tokenReceived, uint256 feeCharged, uint256 priceAtSwap, uint256 newPrice, uint256 timestamp)']);
    const ifaceSell = new ethers.Interface(['event TokenSoldToContract(address indexed seller, address indexed tokenAddr, uint256 tokenAmount, uint256 bnbPaid, uint256 priceUsed, uint256 timestamp)']);
    const buyTxs  = buyLogs.map(log=>{try{const p=ifaceBuy.parseLog(log);return{hash:log.transactionHash,block:log.blockNumber,sender:p.args.buyer,bnb:Number(ethers.formatUnits(p.args.bnbSent,18)),token:Number(ethers.formatUnits(p.args.tokenReceived,18)),symbol:p.args.symbol,type:'buy'};}catch(_){return null;}}).filter(Boolean);
    const sellTxs = sellLogs.map(log=>{try{const p=ifaceSell.parseLog(log);return{hash:log.transactionHash,block:log.blockNumber,sender:p.args.seller,bnb:Number(ethers.formatUnits(p.args.bnbPaid,18)),token:Number(ethers.formatUnits(p.args.tokenAmount,18)),symbol:'SELL',type:'sell'};}catch(_){return null;}}).filter(Boolean);
    S.onchainTxs = [...buyTxs,...sellTxs].sort((a,b)=>b.block-a.block);
    set('sbTxBadge',S.onchainTxs.length);
  }catch(e){ console.warn('[TX]',e.message); }
}

  set('kpiPool',     fmt(S.poolBal)+' '+S.tokenSymbol);
  set('kpiBnb',      fmt(S.bnbColl,4)+' BNB');
  set('kpiTx',       fmt(S.txCount,0));
  set('kpiBnbContract',fmt(S.bnbContractBal,4)+' BNB');
  if(S.bnbPrice>0) set('kpiBnbUsd','≈ $'+fmt(S.bnbColl*S.bnbPrice)+' USD');
  set('statContract',S.contractAddress);
  set('statPool',    fmt(S.poolBal)+' '+S.tokenSymbol);
  set('statBnbC',    fmt(S.bnbContractBal,4)+' BNB');
  set('statBnb',     fmt(S.bnbColl,4)+' BNB');
  set('statTx',      fmt(S.txCount,0)+' swaps');
  set('statSold',    fmt(S.tokensSold)+' '+S.tokenSymbol);
  set('statPrice',   S.usdtzPrice>0?'$'+S.usdtzPrice.toFixed(6):'—');
  set('statBnbRef',  S.bnbRefPrice>0?'$'+S.bnbRefPrice.toFixed(2):'—');
  set('statPaused',  S.paused?'⏸ SÍ':'✅ NO');
  const pp=el('statPaused'); if(pp) pp.className='sl-val '+(S.paused?'red':'green');
  set('topBnb',      S.bnbPrice>0?S.bnbPrice.toFixed(2):'—');
  set('topTime',     new Date().toLocaleTimeString());
  set('cfgPauseStatus', S.paused?'⏸ Pausado':'✅ Activo');
  const cp=el('cfgPauseStatus'); if(cp) cp.className='sl-val '+(S.paused?'red':'green');
  set('cfgWallet',   abbr(S.wallet||''));
  set('cfgContract', abbr(S.contractAddress));
  set('pBnbCurrent', S.bnbRefPrice>0?'$'+S.bnbRefPrice.toFixed(2):'—');
  set('pBnbMarket',  S.bnbPrice>0?'$'+S.bnbPrice.toFixed(2):'—');
  set('bnbContractBal', fmt(S.bnbContractBal,6)+' BNB (≈$'+fmt(S.bnbContractBal*(S.bnbPrice||0),2)+')');

/*
 * [V9 FIX] renderDashTx and renderTxTable now use safeUrl() for all tx hash links.
 * Previously the hash was inserted via: href="https://bscscan.com/tx/${esc(tx.hash)}"
 * which was safe but relied on esc() being called correctly every time.
 * safeUrl() makes the validation inseparable from the URL construction.
 */
function renderDashTx(){
  const wrap=el('dashTxWrap'); if(!wrap)return;
  const txs=S.onchainTxs.slice(0,6);
  if(!txs.length){wrap.innerHTML='<div class="tx-empty">Sin transacciones aún</div>';return;}
  let rows='';
  txs.forEach(tx=>{
    const txUrl = safeUrl(tx.hash,'tx');
    const linkHtml = txUrl
      ? '<a class="tx-link" href="'+txUrl+'" target="_blank" rel="noopener noreferrer">'+esc(abbr(tx.hash))+'</a>'
      : '—';
    rows+='<tr>'
      +'<td style="color:'+(tx.type==='sell'?'var(--red)':'var(--ac)')+';font-size:.7rem;font-weight:700">'+esc(tx.type==='sell'?'SELL':'BUY')+'</td>'
      +'<td class="tx-tok">'+(tx.type==='sell'?'-':'+')+esc(fmt(tx.token,2))+'</td>'
      +'<td class="tx-bnb">'+(tx.type==='sell'?'+':'-')+esc((tx.bnb||0).toFixed(4))+'</td>'
      +'<td class="tx-addr">'+esc(abbr(tx.sender||'—'))+'</td>'
      +'<td>'+linkHtml+'</td>'
      +'</tr>';
  });
  wrap.innerHTML='<table class="tx-table"><thead><tr><th>Tipo</th><th>Tokens</th><th>BNB</th><th>Wallet</th><th>Hash</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderTxTable(){
  const wrap=el('txTableWrap'); if(!wrap)return;
  if(!S.onchainTxs.length){wrap.innerHTML='<div class="tx-empty">Sin transacciones onchain registradas</div>';return;}
  let rows='';
  S.onchainTxs.forEach((tx,i)=>{
    const txUrl = safeUrl(tx.hash,'tx');
    const linkHtml = txUrl
      ? '<a class="tx-link" href="'+txUrl+'" target="_blank" rel="noopener noreferrer">'+esc(abbr(tx.hash))+'</a>'
      : '—';
    rows+='<tr>'
      +'<td style="color:var(--t4)">'+esc(String(S.onchainTxs.length-i))+'</td>'
      +'<td style="color:'+(tx.type==='sell'?'var(--red)':'var(--ac)')+';font-weight:700;font-size:.70rem">'+esc(tx.type==='sell'?'SELL':'BUY')+'</td>'
      +'<td style="color:var(--t3);font-size:.70rem">'+esc(tx.symbol||'—')+'</td>'
      +'<td class="tx-tok">'+(tx.type==='sell'?'-':'+')+esc(fmt(tx.token,2))+'</td>'
      +'<td class="tx-bnb">'+(tx.type==='sell'?'+':'-')+esc((tx.bnb||0).toFixed(4))+'</td>'
      +'<td class="tx-addr">'+esc(abbr(tx.sender||'—'))+'</td>'
      +'<td style="color:var(--t4);font-family:var(--mono);font-size:.67rem">'+esc(String(tx.block||'—'))+'</td>'
      +'<td>'+linkHtml+'</td>'
      +'</tr>';
  });
  wrap.innerHTML='<table class="tx-table"><thead><tr><th>#</th><th>Tipo</th><th>Símbolo</th><th>Tokens</th><th>BNB</th><th>Wallet</th><th>Bloque</th><th>Hash</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

let chartBar=null, chartDonut=null;
function renderCharts(){
  const txData=[...S.onchainTxs].filter(t=>t.type==='buy').slice(0,20).reverse();
  set('chartBadge',S.onchainTxs.length+' txs');
  const barC=el('chartBar');
  if(barC){
    if(chartBar){chartBar.destroy();chartBar=null;}
    chartBar=new Chart(barC,{type:'bar',data:{labels:txData.length?txData.map((_,i)=>'#'+(i+1)):['Sin datos'],datasets:[{data:txData.length?txData.map(t=>t.token||0):[0],backgroundColor:'rgba(0,245,160,.18)',borderColor:'#00f5a0',borderWidth:1.5,borderRadius:5,hoverBackgroundColor:'rgba(0,245,160,.4)'}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'rgba(255,255,255,.25)',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'rgba(255,255,255,.25)',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}}}});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(type,title,msg=''){
  const icons={ok:'✅',err:'❌',info:'ℹ️'};
  const d=document.createElement('div');
  d.className='toast '+type;
  // [V9 FIX] Build toast with textContent, not innerHTML with user data
  const ico=document.createElement('span'); ico.className='t-ico'; ico.textContent=icons[type]||'•';
  const body=document.createElement('div');
  const t1=document.createElement('div'); t1.className='t-title'; t1.textContent=String(title||'');
  body.appendChild(t1);
  if(msg){ const t2=document.createElement('div'); t2.className='t-msg'; t2.textContent=String(msg); body.appendChild(t2); }
  d.appendChild(ico); d.appendChild(body);
  el('toastStack').prepend(d);
  setTimeout(()=>d.remove(),5500);
}

// ── PRICE ──────────────────────────────────────────────────────────────────────
const resolveToken = addr => (!addr||!addr.trim()) ? USDTZ : addr.trim();

async function doUpdateBnbRef(force){
  const val = el('bnbPriceInput')?.value.trim();
  if(!val){ toast('err','Campo vacío','Ingresa el precio en wei'); return; }
  try{
    toast('info',force?'Forzando…':'Actualizando…','Confirma en tu wallet');
    const tx = force ? await getWC().forceUpdateBnbRefPrice(BigInt(val)) : await getWC().updateBnbRefPrice(BigInt(val));
    await tx.wait();
    toast('ok','Precio BNB actualizado','');
    await loadStats(); renderAll();
  }catch(e){ handleErr(e,'Error actualizando precio BNB'); }
}
function fillBnbFromMarket(){
  if(!S.bnbPrice){ toast('err','Sin precio','Espera a que cargue'); return; }
  const wei = ethers.parseUnits(S.bnbPrice.toFixed(2),18).toString();
  const inp = el('bnbPriceInput'); if(inp) inp.value=wei;
  toast('info','Cargado','$'+S.bnbPrice.toFixed(2));
}
async function loadTokenPrices(){
  const wrap=el('tokPricesList'); if(!wrap) return;
  try{
    const [addrs,syms]=await withFallback(()=>getRC().listActiveTokens());
    if(!addrs.length){ wrap.textContent='No hay tokens activos'; return; }
    let html='';
    for(let i=0;i<addrs.length;i++){
      const inf=await withFallback(()=>getRC().getTokenInfo(addrs[i])).catch(()=>null);
      if(!inf) continue;
      html+='<div class="stat-line"><span class="sl-lbl">'+esc(syms[i])+'</span><span class="sl-val green" style="font-size:.68rem">'+(Number(inf[1])/1e18).toFixed(8)+' BNB</span></div>';
    }
    wrap.innerHTML=html;
  }catch(e){ wrap.textContent='Error: '+String(e.message||'').slice(0,60); }
}
async function doSetTokenPrice(){
  const addr = el('priceTokenAddr')?.value.trim();
  const val  = el('priceTokenValue')?.value.trim();
  if(!val){ toast('err','Ingresa el precio',''); return; }
  try{
    toast('info','Aplicando…','Confirma en tu wallet');
    let tx;
    if(!addr){ tx = await getWC().setUSDTzPrice(BigInt(val)); }
    else {
      if(!isAddr(addr)){ toast('err','Dirección inválida',''); return; }
      tx = await getWC().setTokenPrice(addr,BigInt(val));
    }
    await tx.wait();
    toast('ok','Precio aplicado','');
    await loadTokenPrices();
  }catch(e){ handleErr(e,'Error'); }
}

// ── POOL ──────────────────────────────────────────────────────────────────────
async function doDeposit(){
  const addr = el('depTokenAddr')?.value.trim()||'';
  const amt  = parseFloat(el('depAmount')?.value);
  const t    = resolveToken(addr);
  if(!amt||amt<=0){ toast('err','Monto inválido',''); return; }
  try{
    const amtWei = ethers.parseUnits(amt.toFixed(6),18);
    const tw = await getTokWC(t);
    toast('info','Paso 1/2 — Aprobando…','');
    const appTx = await tw.approve(S.contractAddress,amtWei); await appTx.wait();
    toast('info','Paso 2/2 — Depositando…','');
    const tx = t===USDTZ ? await getWC().depositTokens(amtWei) : await getWC().depositToken(t,amtWei);
    await tx.wait();
    toast('ok','Depósito exitoso','');
    await loadStats(); renderAll(); loadPoolBalances();
  }catch(e){ handleErr(e,'Error en depósito'); }
}
async function loadPoolBalances(){
  const wrap=el('poolBalancesList'); if(!wrap) return;
  try{
    const [addrs,syms]=await withFallback(()=>getRC().listActiveTokens());
    if(!addrs.length){ wrap.textContent='No hay tokens'; return; }
    let html='';
    for(let i=0;i<addrs.length;i++){
      const bal=await withFallback(()=>getRC().getTokenPoolBalance(addrs[i])).catch(()=>0n);
      html+='<div class="stat-line"><span class="sl-lbl">'+esc(syms[i])+'</span><span class="sl-val green">'+fmt(Number(ethers.formatUnits(bal,18)),2)+'</span></div>';
    }
    wrap.innerHTML=html;
  }catch(e){ wrap.textContent='Error'; }
}
async function doWithdraw(partial){
  const addr = el('wdTokenAddr')?.value.trim()||'';
  const t    = resolveToken(addr);
  const amtRaw = el('wdAmount')?.value;
  if(partial && (!amtRaw||parseFloat(amtRaw)<=0)){ toast('err','Ingresa cantidad',''); return; }
  try{
    toast('info',partial?'Retirando parcial…':'Retirando todo…','');
    let tx;
    if(partial){
      const amtWei = ethers.parseUnits(parseFloat(amtRaw).toFixed(6),18);
      tx = t===USDTZ ? await getWC().withdrawTokens(amtWei) : await getWC().withdrawToken(t,amtWei);
    }else{
      tx = t===USDTZ ? await getWC().withdrawAllTokens() : await getWC().withdrawAllOfToken(t);
    }
    await tx.wait();
    toast('ok','Retiro exitoso','');
    await loadStats(); renderAll(); loadPoolBalances();
  }catch(e){ handleErr(e,'Error en retiro'); }
}

  try{

    const c=new ethers.Contract(S.contractAddress,CONTRACT_ABI,s);
    toast('info','Depositando BNB…','');
    const tx=await c.depositBNBForBuyback({value:ethers.parseEther(amt.toFixed(6))});
    await tx.wait(); toast('ok','BNB depositado','');
    if(el('bnbDepAmt')) el('bnbDepAmt').value='';
    await loadBnbBal();
  }catch(e){ handleErr(e,'Error'); }
}

// ── BUYBACK ───────────────────────────────────────────────────────────────────
async function loadBuybackPanel(){
  try{
    const [addrs,syms,prices]=await withFallback(()=>getRC().listActiveTokens());
    const wrap=el('bbTokenList'); if(!wrap) return;
    if(!addrs.length){ wrap.textContent='No hay tokens activos'; return; }
    let html='';
    for(let i=0;i<addrs.length;i++){
      let en=false,bp=0;
      try{ const bb=await withFallback(()=>getRC().getBuybackInfo(addrs[i])); en=bb[0]; bp=Number(ethers.formatUnits(bb[1],18)); }catch(_){}
      html+='<div class="tok-row">'
        +'<div><div class="tok-sym">'+esc(syms[i])+' <span class="tok-badge '+(en?'active':'inactive')+'">'+(en?'Activo':'Inactivo')+'</span></div>'
        +'<div class="tok-addr">'+esc(addrs[i])+'</div>'
        +(en?'<div style="font-size:.67rem;color:var(--t3);margin-top:2px">Precio: <strong style="color:var(--ac)">'+esc(bp.toFixed(8))+' BNB</strong></div>':'')
        +'</div>'
        +'<button class="btn-sm" onclick="selectBbToken(\''+esc(addrs[i])+'\',\''+esc(syms[i])+'\','+Number(prices[i])+')">Configurar</button>'
        +'</div>';
    }
    wrap.innerHTML=html;
  }catch(e){ const w=el('bbTokenList'); if(w) w.textContent='Error cargando tokens'; }
}

// ── TOKENS ────────────────────────────────────────────────────────────────────
async function loadTokenList(){
  const wrap=el('tokenListWrap'); if(!wrap) return;
  try{
    const count=Number(await withFallback(()=>getRC().getTokenCount()));
    set('tokenCountBadge',count);
    if(!count){ wrap.textContent='No hay tokens registrados'; return; }
    let html='';
    for(let i=0;i<count;i++){
      const addr=await withFallback(()=>getRC().getTokenAt(i));
      const inf=await withFallback(()=>getRC().getTokenInfo(addr)).catch(()=>null);
      if(!inf) continue;
      const sym=inf[0]; const active=inf[13];
      html+='<div class="tok-row">'
        +'<div style="flex:1"><div class="tok-sym">'+esc(sym)+' <span class="tok-badge '+(active?'active':'inactive')+'">'+(active?'Activo':'Inactivo')+'</span></div>'
        +'<div class="tok-addr">'+esc(addr)+'</div></div>'
        +'<div>'+(active?'<button class="btn-sm" style="color:var(--red)" onclick="doRemoveToken(\''+esc(addr)+'\')">Desactivar</button>':'<button class="btn-sm" style="color:var(--ac)" onclick="doReactivateToken(\''+esc(addr)+'\')">Reactivar</button>')+'</div>'
        +'</div>';
    }
    wrap.innerHTML=html||'<div style="color:var(--t4)">Sin tokens</div>';
  }catch(e){ wrap.textContent='Error: '+String(e.message||'').slice(0,60); }
}
async function doRemoveToken(addr){
  if(!confirm('¿Desactivar este token?')) return;
  try{ const tx=await getWC().removeToken(addr); toast('info','Enviado',''); await tx.wait(); toast('ok','Token desactivado',''); await loadTokenList(); }
  catch(e){ handleErr(e,'Error'); }
}
async function doReactivateToken(addr){
  try{ const tx=await getWC().reactivateToken(addr); toast('info','Enviado',''); await tx.wait(); toast('ok','Token reactivado',''); await loadTokenList(); }
  catch(e){ handleErr(e,'Error'); }
}

// ── TEST TOKEN ────────────────────────────────────────────────────────────────
async function doSendTestToken(){
  const tokenAddr=el('ttToken')?.value.trim()||'';
  const recipient=el('ttRecipient')?.value.trim();
  if(!recipient||!isAddr(recipient)){ toast('err','Wallet inválida',''); return; }
  try{
    const used=await withFallback(()=>getRC().hasUsedTest(recipient));
    if(used){ toast('err','Ya recibido','Esta wallet ya tiene token de prueba'); return; }
    toast('info','Enviando…','');
    let tx;
    if(!tokenAddr){ tx=await getWC().sendTestToken(recipient); }
    else{
      if(!isAddr(tokenAddr)){ toast('err','Token inválido',''); return; }
      tx=await getWC()['sendTestToken(address,address)'](recipient,tokenAddr);
    }
    await tx.wait();
    toast('ok','Token enviado','→ '+abbr(recipient));
    if(el('ttRecipient')) el('ttRecipient').value='';
    await loadStats(); renderAll();
  }catch(e){ handleErr(e,'Error'); }
}
async function doCheckTestToken(){
  const w=el('ttCheckWallet')?.value.trim();
  const res=el('ttCheckResult');
  if(!w||!isAddr(w)){ if(res) res.textContent='Wallet inválida'; return; }
  try{
    const used=await withFallback(()=>getRC().hasUsedTest(w));
    if(res) res.textContent=used?'🚫 Ya recibió token':'✅ No ha recibido aún';
  }catch(e){ if(res) res.textContent='Error: '+String(e.message||'').slice(0,60); }
}

async function doVerifyContract(){
  const addr=el('newContractAddr')?.value.trim();
  const msg=el('newContractMsg');
  if(!isAddr(addr)){ if(msg){msg.textContent='✗ Inválida';msg.className='valid-msg err';} return; }
  if(msg){msg.textContent='Verificando…';msg.className='valid-msg';}
  try{
    await withFallback(()=>new ethers.Contract(addr,CONTRACT_ABI,getProvider()).isAdmin(S.wallet));

function doApplyContract(){
  const addr=el('newContractAddr')?.value.trim();
  if(!isAddr(addr)){ toast('err','Dirección inválida',''); return; }

// ── ERROR HANDLER ─────────────────────────────────────────────────────────────
function handleErr(e,label='Error'){
  if(e.code===4001||e.code==='ACTION_REJECTED') toast('err','Rechazado','Cancelado por el usuario');
  else toast('err',label, String(e?.reason||e?.shortMessage||e?.message||'').slice(0,80));
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
const viewTitles={
  dashboard:'Dashboard',transactions:'Transacciones',
  precio:'Precio',pool:'Pool de Tokens',
  bnb:'Gestión BNB',buyback:'Recompra',
  tokens:'Tokens',acceso:'Whitelist / Blacklist',
  testtok:'Test Token',admins:'Administradores',config:'Configuración'
};

function switchView(name){
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.toggle('active',b.dataset.view===name));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const cap=name.charAt(0).toUpperCase()+name.slice(1);
  const t=el('view'+cap); if(t) t.classList.add('active');
  set('topTitle',viewTitles[name]||name);
  if(name==='dashboard'){ renderCharts(); renderDashTx(); }
  if(name==='transactions') renderTxTable();
  if(name==='precio') loadTokenPrices();
  if(name==='pool'){ loadPoolBalances(); }
  if(name==='bnb') loadBnbBal();
  if(name==='buyback') loadBuybackPanel();
  if(name==='tokens') loadTokenList();
}

// ── CONNECT ───────────────────────────────────────────────────────────────────
async function connect(){
  el('lockErr').textContent='';
  if(!window.ethereum){el('lockErr').textContent='MetaMask no detectado';return;}
  try{
    const accounts=await window.ethereum.request({method:'eth_requestAccounts'});
    const addr=accounts[0].toLowerCase();
    if(!AUTHORIZED.includes(addr)){
      // [V2 FIX] Do not reveal which specific wallets ARE authorized
      el('lockErr').textContent='Wallet no autorizada para este panel';
      return;
    }
    // [V4 FIX] Verify chain before allowing panel access
    const chainId=await window.ethereum.request({method:'eth_chainId'});
    const chainNum=typeof chainId==='string'?parseInt(chainId,16):Number(chainId);
    if(chainNum!==56){
      try{
        await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:BSC_CHAIN_ID}]});
        // Verify again after switch
        const newChain=await window.ethereum.request({method:'eth_chainId'});
        const newNum=typeof newChain==='string'?parseInt(newChain,16):Number(newChain);
        if(newNum!==56){el('lockErr').textContent='Cambia a BSC Mainnet para continuar';return;}
      }catch(e){
        if(e.code===4902) el('lockErr').textContent='Agrega BSC Mainnet a MetaMask y reintenta';
        else el('lockErr').textContent='Error cambiando de red';
        return;
      }
    }
    const onchain=await withFallback(()=>getRC().isAdmin(addr)).catch(()=>false);
    if(!onchain){el('lockErr').textContent='Wallet no autorizada en el contrato onchain';return;}
    S.wallet=addr;
    // Use textContent — not innerHTML — for wallet address display
    const sbAddrEl=el('sbAddr'); if(sbAddrEl) sbAddrEl.textContent=abbr(addr);
    const lockAddrEl=el('lockAddr'); if(lockAddrEl){ lockAddrEl.style.display=''; lockAddrEl.textContent=abbr(addr); }
    el('lockScreen').style.display='none';
    el('shell').classList.add('visible');
    toast('info','Cargando dashboard…','');
    await Promise.all([fetchBnbPrice(),loadStats()]);
    await loadOnchainTxs();
    renderAll();
    toast('ok','Dashboard listo','BSC Mainnet — v4.9');
    setInterval(async()=>{ await fetchBnbPrice(); set('topBnb',S.bnbPrice>0?S.bnbPrice.toFixed(2):'—'); },15000);
    setInterval(async()=>{ await loadStats(); renderAll(); },30000);
    setInterval(()=>set('topTime',new Date().toLocaleTimeString()),1000);
  }catch(e){ if(e.code===4001) el('lockErr').textContent='Conexión rechazada'; else el('lockErr').textContent=String(e.message||'Error').slice(0,80); }
}

function disconnect(){
  S.wallet=null;
  el('shell').classList.remove('visible');
  el('lockScreen').style.display='';
  const lockAddrEl=el('lockAddr'); if(lockAddrEl) lockAddrEl.style.display='none';
  el('lockErr').textContent='';
}

async function refreshAll(){
  const btn=el('refreshBtn');
  if(btn){btn.classList.add('spinning');setTimeout(()=>btn.classList.remove('spinning'),600);}
  await Promise.all([fetchBnbPrice(),loadStats()]); await loadOnchainTxs();
  renderAll(); renderDashTx();
  toast('ok','Actualizado','');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  // Inject views into content div
  const content=el('mainContent');
  if(content) content.innerHTML=buildDashboardView();

  el('lockBtn').addEventListener('click',connect);
  el('logoutBtn').addEventListener('click',disconnect);
  el('refreshBtn').addEventListener('click',refreshAll);
  el('refreshTxBtn')?.addEventListener('click',async()=>{
    const w=el('txTableWrap'); if(w) w.innerHTML='<div class="tx-loading">Cargando</div>';
    await loadOnchainTxs(); renderTxTable();
  });
  document.querySelectorAll('.sb-item').forEach(btn=>btn.addEventListener('click',()=>switchView(btn.dataset.view)));

  if(el('newContractAddr')) el('newContractAddr').addEventListener('input',function(){
    const v=isAddr(this.value.trim());
    const msg=el('newContractMsg'); if(!msg) return;
    msg.className='valid-msg '+(v?'ok':'err');
    msg.textContent=v?'✓ Válida':this.value.length>2?'✗ Inválida':'';
    const btn=el('applyContractBtn'); if(btn) btn.disabled=true;
  });

  if(window.ethereum){
    window.ethereum.request({method:'eth_accounts'}).then(accounts=>{
      if(accounts.length&&AUTHORIZED.includes(accounts[0].toLowerCase())) connect();
    }).catch(()=>{});
    window.ethereum.on('accountsChanged',async accs=>{
      if(!accs.length){disconnect();}
      else if(AUTHORIZED.includes(accs[0].toLowerCase())){
        S.wallet=accs[0].toLowerCase();
        const el2=el('sbAddr'); if(el2) el2.textContent=abbr(accs[0]);
        toast('info','Cuenta cambiada',abbr(accs[0]));
      }
    });
    window.ethereum.on('chainChanged',chainId=>{
      const id=typeof chainId==='string'?parseInt(chainId,16):Number(chainId);
      if(id!==56){
        toast('err','Red incorrecta','Cambia a BSC Mainnet. Desconectando por seguridad.');
        disconnect();
      }
    });
  }

  console.log('%c⚙️ MiSwap Admin Console v4.9 — BSC Mainnet','color:#00f5a0;font-size:1rem;font-weight:bold');
});
</script>
